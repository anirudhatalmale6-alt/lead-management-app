<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/lead-management-app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Lead Management System">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="lead_management_demo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Lead Management System</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; padding: 0; background: #f5f5f5; }
    .loading-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; font-family: sans-serif;
    }
    .loading-screen h2 { color: #1565C0; margin-bottom: 16px; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #e0e0e0;
      border-top: 4px solid #1565C0; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Enable text selection in Flutter web */
    flt-glass-pane {
      user-select: text !important;
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
    <h2>Lead Management System</h2>
    <p style="color:#757575;">Loading app...</p>
  </div>
  <script>
    // Aggressively clear ALL service workers and their caches
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var r of registrations) { r.unregister(); }
      });
    }
    // Also clear all caches (service worker caches)
    if ('caches' in window) {
      caches.keys().then(function(names) {
        for (var name of names) { caches.delete(name); }
      });
    }
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
  <script>
    var s = document.createElement('script');
    s.src = 'flutter_bootstrap.js?v=58_' + Date.now();
    s.async = true;
    document.body.appendChild(s);
  </script>
</body>
</html>
